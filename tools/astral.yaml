# ASTRAL (ASTER implementation): species tree from gene trees under the
# multispecies coalescent. Registered-but-unavailable until installed; the
# harness refuses to fake a species tree if it is missing.
tool_id: astral
tool_name: ASTRAL (ASTER)
version_command: "astral --help"
requires_gpu: false
requires_network: false
input_formats: [Newick]
output_formats: [Newick]
risks:
  - estimates the species tree under the MSC; assumes ILS is the only source of discordance
  - garbage gene trees in -> garbage species tree out
validators:
  - exit_code_zero
  - newick_valid
