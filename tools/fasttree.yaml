tool_id: fasttree
tool_name: FastTree
version_command: "fasttree -help"
requires_gpu: false
requires_network: false
input_formats: [FASTA, PHYLIP]
output_formats: [Newick]
risks:
  - approximate ML; local SH-like supports are not classical bootstrap
  - topology is sensitive to alignment quality and model
validators:
  - exit_code_zero
  - newick_valid
