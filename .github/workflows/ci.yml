# Audit P2.12 — CI: lint + typecheck + tests on every push/PR.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest ruff mypy dendropy
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy harness
      - name: Tests
        run: pytest -q
